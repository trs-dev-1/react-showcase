<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
      }

      #bootstrap-loader {
        position: fixed;
        inset: 0;
        display: flex;
        z-index: 10000;
        width: 100%;
        height: 100vh;
        align-items: center;
        justify-content: center;
        background-color: hsl(var(--loader-background));
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes fadeOut {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
        }
      }

      #bootstrap-loader.fade-out {
        animation: fadeOut 300ms ease-out forwards;
        animation-delay: 400ms;
      }

      .bootstrap-loader-text {
        cursor: default;
        background: linear-gradient(to right, #3e63dd, #8e4ec6, #d6409f);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-family:
          "Inter Variable", system-ui, -apple-system, sans-serif;
        font-size: 32px;
        font-weight: bold;
        font-feature-settings: "cv11";
        animation: fadeIn 200ms ease-in forwards;
      }
    </style>
    <title>Listify</title>
  </head>
  <body class="overflow-y-hidden">
    <div id="root" class="size-full"></div>
    <div id="bootstrap-loader">
      <div class="bootstrap-loader-text">listify</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      const loader = document.querySelector("#bootstrap-loader");
      if (loader) {
        document.body.style.setProperty("--loader-background", "0 0% 100%");
        const uiPreferencesRaw = localStorage.getItem("ui_preferences");

        if (uiPreferencesRaw) {
          try {
            const uiPreferences = JSON.parse(uiPreferencesRaw);
            const theme = uiPreferences?.state?.state?.themeMode;

            if (theme === "dark") {
              document.body.style.setProperty(
                "--loader-background",
                "224 71.4% 4.1"
              );
            }
          } catch (e) {
            console.error("Failed to parse ui_preferences:", e);
          }
        }
      }

      function removePreloader() {
        const preloader = document.querySelector("#bootstrap-loader");
        if (preloader) {
          preloader.classList.add("fade-out");
          setTimeout(() => {
            preloader.remove();
          }, 700);
        }
      }

      if (document.readyState === "loading") {
        window.addEventListener("DOMContentLoaded", removePreloader);
      } else {
        removePreloader();
      }
    </script>
  </body>
</html>
